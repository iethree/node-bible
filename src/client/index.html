<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" viewport-fit="cover" />
		<meta name="theme-color" content="#f4f4f5" />
		<script>
			// Apply theme before paint so the address bar and page background match.
			(function () {
				var saved = localStorage.getItem("night");
				var night =
					saved === "true" ||
					(saved === null && window.matchMedia("(prefers-color-scheme: dark)").matches);
				if (night) document.documentElement.classList.add("dark");
				document
					.querySelector('meta[name="theme-color"]')
					.setAttribute("content", night ? "#18181b" : "#f4f4f5");
			})();
		</script>
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="mobile-web-app-capable" content="yes" />
		<link rel="icon" href="/favicon.png" />
		<title>Bible</title>
	</head>
	<body class="min-h-dvh bg-zinc-100 text-zinc-900 antialiased dark:bg-zinc-900 dark:text-zinc-100">
		<div id="app"></div>
		<script type="module" src="/main.tsx"></script>
	</body>
</html>
